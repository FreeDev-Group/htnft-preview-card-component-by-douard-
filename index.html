<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Preview Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon-32x32.png" type="image/png">
</head>

<body>
    <main class="card-container">
        <div class="card">
            <div class="card-image">
                <img src="images/image-equilibrium.jpg" alt="Equilibrium NFT" class="nft-img">
        
                <a href="#" class="overlay">
                    <img src="images/icon-view.svg" alt="View icon">
                </a>
            </div>
            <h1 class="title">Equilibrium #3429</h1>
            <p class="description">Our Equilibrium collection promotes balance and calm.</p>
            <div class="card-info">
                <div class="price">
                    <img src="images/icon-ethereum.svg" alt="Ethereum icon">
                    <span>0.041 ETH</span>
                </div>
                <div class="time">
                    <img src="images/icon-clock.svg" alt="Clock icon">
                    <span>3 days left</span>
                </div>
            </div>
            <hr>
            <div class="creator">
                <img src="images/image-avatar.png" alt="Creator avatar" class="avatar">
                <p>Creation of <span>Jules Wyvern</span></p>
            </div>
        </div>
    </main>
</body>

</html>
